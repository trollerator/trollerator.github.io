openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: meme
    description: Meme transformation operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /meme/transform:
    post:
      operationId: transformToMeme
      tags: [meme]
      summary: Transform a photo into a Jeo Boden meme character
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                image:
                  type: string
                  format: binary
                  description: The user's photo to transform
              required:
                - image
      responses:
        "200":
          description: Transformed meme image in base64
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemeTransformResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    MemeTransformResult:
      type: object
      properties:
        b64_json:
          type: string
          description: Base64 encoded PNG image of the meme character
        mimeType:
          type: string
          description: MIME type of the image
      required:
        - b64_json
        - mimeType
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
